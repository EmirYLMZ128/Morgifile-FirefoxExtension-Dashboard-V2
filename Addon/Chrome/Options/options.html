<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MorgiFile Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #181818;
            --card-bg: #121212;
            --accent: #2563eb;
            --text-light: #f8fafc;
            --text-dim: #94a3b8;
            --border: #2a2a2a;
            --success: #10b981;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        p.desc {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .setting-group {
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .setting-group:last-child {
            border-bottom: none;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .label-info h3 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
        }

        .label-info p {
            margin: 4px 0 0;
            font-size: 13px;
            color: var(--text-dim);
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 28px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #334155;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        .status-msg {
            margin-top: 20px;
            font-size: 13px;
            color: var(--success);
            text-align: center;
            opacity: 0;
            transition: 0.3s;
        }

        .status-msg.show {
            opacity: 1;
        }

        .footer {
            margin-top: 32px;
            text-align: center;
            font-size: 12px;
            color: var(--text-dim);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MorgiFile Settings</h1>
        <p class="desc">Customize your experience across the dashboard and extension.</p>

        <div class="setting-group">
            <div class="label-row">
                <div class="label-info">
                    <h3>Theme Selection</h3>
                    <p>Switch between Dark and Light mode.</p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="theme-toggle">
                    <span class="slider"></span>
                </label>
            </div>
            <div style="margin-top: 10px; font-size: 12px; color: var(--text-dim);">
                Current: <span id="theme-status" style="font-weight: 600; color: var(--text-light);">Dark Mode</span>
            </div>
        </div>

        <div class="setting-group">
            <div class="label-row">
                <div class="label-info">
                    <h3>Server Port</h3>
                    <p>Manually set port if auto-detect fails.</p>
                </div>
                <input type="number" id="port-input" value="8000" style="background: var(--bg-dark); color: var(--text-light); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; width: 80px; text-align: center; font-family: inherit; font-weight: 600;">
            </div>
        </div>

        <div class="status-msg" id="status">Settings saved successfully!</div>

        <div class="footer">
            MorgiFile V5 • All rights reserved
        </div>
    </div>

    <script src="options.js"></script>
</body>
</html>
