<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg-dark: #121212;
      --accent: #6366f1;
      --deactive: #cf6679;
      --active: #03dac6;
    }
    body {
      width: 240px;
      background: var(--bg-dark);
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 16px;
      margin: 0;
      user-select: none;
    }
    .status-container {
      text-align: center;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .hostname {
      color: var(--accent);
      font-weight: 600;
      display: block;
      margin-top: 4px;
      word-break: break-all;
    }
    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      transition: all 0.2s ease;
      outline: none;
    }
    button:active { transform: scale(0.97); }
    
    .btn-deactive { background: var(--deactive); color: white; }
    .btn-active { background: var(--active); color: #000; }
  </style>
</head>
<body>
  <div class="status-container">
    MorgiFile is <span id="status-label">...</span> on:
    <span id="site-name" class="hostname">Detecting...</span>
  </div>
  <button id="toggle-btn" class="btn-deactive">Loading...</button>
  <script src="popup.js"></script>
</body>
</html>
